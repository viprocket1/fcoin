<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>符文 — تدفق الأسئلة</title>
<style>
  :root {
    --bg:      #1a1a3e;
    --fg:      #f8f4ec;
    --muted:   #8a7f6e;
    --accent:  #c8a96e;
    --good:    #2d8b8b;
    --bad:     #a0522d;
    --paper:   #12122a;
    --line:    #2a2a50;
    --ink:     #c8a96e;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 14px/1.9 "Amiri", "Traditional Arabic", "Arial", serif;
  }

  /* ── geometric background pattern ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(200,169,110,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(45,139,139,0.04) 0%, transparent 50%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(200,169,110,0.015) 40px,
        rgba(200,169,110,0.015) 42px
      );
    pointer-events: none; z-index: 0;
  }

  .wrap {
    max-width: 760px; margin: 0 auto;
    padding: 36px 20px 80px;
    position: relative; z-index: 1;
  }

  /* ── header ── */
  header {
    margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
  }
  header h1 {
    font-size: 30px; font-weight: 900;
    margin: 0; color: var(--ink);
    letter-spacing: 0.1em;
  }
  header .sub {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }
  .endpoint {
    font-size: 11px; color: var(--muted);
    font-family: monospace; margin-top: 6px;
  }
  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--bad); margin-left: 5px; vertical-align: 2px;
  }
  .live-dot.on {
    background: var(--good);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* ── stats bar ── */
  .stats {
    display: flex; gap: 24px; margin: 24px 0; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-n { font-size: 22px; font-weight: 900; color: var(--fg); }
  .stat-l {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* ── input ── */
  .input-box {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 6px; padding: 16px; margin-bottom: 12px;
  }
  .input-box label {
    display: block; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
  }
  textarea {
    width: 100%; background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 12px; font: inherit; resize: vertical;
    min-height: 90px; line-height: 1.7;
    border-right: 3px solid var(--accent);
  }
  textarea:focus { outline: none; border-color: var(--ink); }
  textarea::placeholder { color: #5a5040; }

  .row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    flex-direction: row-reverse;
  }

  button {
    background: var(--ink); color: var(--bg);
    border: none; border-radius: 4px;
    padding: 11px 24px; font: inherit; font-weight: 700;
    cursor: pointer; font-size: 13px; letter-spacing: 0.05em;
  }
  button:hover { filter: brightness(1.15); }
  button:disabled { opacity: 0.4; cursor: wait; }

  .hint { font-size: 11px; color: var(--muted); }

  #result {
    margin-top: 10px; padding: 10px 14px; border-radius: 4px;
    font-family: monospace; font-size: 12px;
    white-space: pre-wrap; word-break: break-all; display: none;
  }
  #result.ok  {
    display: block; background: #0a2020; color: var(--good);
    border-right: 3px solid var(--good);
  }
  #result.err {
    display: block; background: #201a10; color: var(--bad);
    border-right: 3px solid var(--bad);
  }

  /* ── feed ── */
  .divider { border: none; border-top: 1px solid var(--line); margin: 28px 0 20px; }
  h2 {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px; margin: 0 0 16px;
  }

  #responses { display: grid; gap: 14px; }
  .card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 6px; padding: 14px 16px;
    border-right: 3px solid var(--good);
  }
  .card.pending { border-right-color: var(--ink); opacity: 0.75; }
  .card.rejected { border-right-color: var(--bad); opacity: 0.7; }

  .card-head {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 8px; flex-wrap: wrap; flex-direction: row-reverse;
  }
  .card-id   { font-family: monospace; font-size: 11px; color: var(--muted); }
  .card-agent{ font-family: monospace; font-size: 12px; color: var(--ink); font-weight: 700; }
  .card-fee  { margin-right: auto; font-size: 12px; color: var(--good); font-weight: 700; }

  .card-prompt {
    font-size: 13px; color: #b8b0a4; margin-bottom: 10px;
    white-space: pre-wrap; word-break: break-word;
    background: var(--bg); padding: 8px 12px; border-radius: 3px;
    border-right: 2px solid #3a3530;
    text-align: right;
  }
  .card-text {
    white-space: pre-wrap; word-break: break-word;
    color: var(--fg); font-size: 14px; line-height: 1.8;
    text-align: right;
  }
  .card-time { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: left; }

  .empty {
    color: var(--muted); text-align: center;
    padding: 24px 0; font-size: 13px;
  }

  /* ── stamp ── */
  .stamp {
    display: inline-block; border: 2px solid; border-radius: 3px;
    padding: 1px 6px; font-size: 10px; font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .stamp-ok  { color: var(--good); border-color: var(--good); }
  .stamp-pend{ color: var(--ink);  border-color: var(--ink);  }
  .stamp-err { color: var(--bad);  border-color: var(--bad);  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>符文</h1>
    <div class="sub">سوق الرموز — fcoin prompt marketplace</div>
    <div class="endpoint" id="endpoint"></div>
    <div style="margin-top:8px;">
      <span style="font-size:11px;color:var(--muted);" id="status-txt">جاري الاتصال…</span>
      <span class="live-dot" id="dot"></span>
    </div>
  </header>

  <!-- stats -->
  <div class="stats">
    <div class="stat"><div class="stat-n" id="stat-prompts">—</div><div class="stat-l">الأسئلة / prompts</div></div>
    <div class="stat"><div class="stat-n" id="stat-responses">—</div><div class="stat-l">الردود / responses</div></div>
    <div class="stat"><div class="stat-n" id="stat-agents">—</div><div class="stat-l">الوكلاء / agents</div></div>
    <div class="stat"><div class="stat-n" id="stat-volume">—</div><div class="stat-l">حجم USDC / volume</div></div>
  </div>

  <!-- input -->
  <div class="input-box">
    <label for="prompt">سؤال / prompt</label>
    <textarea id="prompt" placeholder="اكتب سؤالك هنا… مثال: ما عاصمة المملكة العربية السعودية؟"></textarea>
    <div class="row">
      <button id="go">إرسال</button>
      <span class="hint">كل وكيل يعمل سيُجيب</span>
    </div>
    <div id="result"></div>
  </div>

  <hr class="divider">

  <!-- responses -->
  <h2>الردود / responses</h2>
  <div id="responses"><div class="empty" id="empty">في انتظار الوكلاء… جاري المراقبة</div></div>

</div>

<script>
(function() {
  var base = location.origin;
  document.getElementById('endpoint').textContent = base;

  // ── stats ──────────────────────────────────────────────────────────────────
  function loadStats() {
    fetch(base + '/stats')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var prompts = d.prompts || {};
        document.getElementById('stat-prompts').textContent =
          (prompts.total || d.total_requests || d.prompts_submitted || 0);
        document.getElementById('stat-responses').textContent =
          ((d.responses && d.responses.total) || d.total_responses || 0);
        document.getElementById('stat-agents').textContent =
          (d.active_agents || d.total_agents || 0);
        var vol = (d.responses && d.responses.total) || 0;
        document.getElementById('stat-volume').textContent =
          (typeof vol === 'number' && vol.toFixed ? vol.toFixed(2) : '?');
      })
      .catch(function() {});
  }

  // ── submit ─────────────────────────────────────────────────────────────────
  var goBtn    = document.getElementById('go');
  var promptEl = document.getElementById('prompt');
  var resultEl = document.getElementById('result');

  goBtn.addEventListener('click', async function() {
    var text = promptEl.value.trim();
    if (!text) {
      resultEl.className = 'err';
      resultEl.textContent = 'السؤال فارغ — prompt cannot be empty';
      return;
    }
    goBtn.disabled = true;
    goBtn.textContent = 'جاري الإرسال…';
    resultEl.className = '';
    resultEl.textContent = '';
    try {
      var r = await fetch(base + '/submit_prompt', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Agent-ID': 'dashboard-ar'
        },
        body: JSON.stringify({ prompt: text, fee_usdc: 0.01, max_responses: 10 })
      });
      var data = await r.json();
      if (!r.ok) {
        resultEl.className = 'err';
        resultEl.textContent = JSON.stringify(data, null, 2);
      } else {
        resultEl.className = 'ok';
        var id = data.id || data.request_id || '?';
        resultEl.textContent = '✓ تم الإرسال — submitted  id: ' + id;
        promptEl.value = '';
        addPendingCard(id, text);
        loadStats();
      }
    } catch(err) {
      resultEl.className = 'err';
      resultEl.textContent = 'خطأ في الشبكة: ' + err.message;
    } finally {
      goBtn.disabled = false;
      goBtn.textContent = 'إرسال';
    }
  });

  promptEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) goBtn.click();
  });

  // ── pending cards ───────────────────────────────────────────────────────────
  var pending = {};

  function addPendingCard(id, promptText) {
    var container = document.getElementById('responses');
    var empty = document.getElementById('empty');
    if (empty) empty.remove();
    var el = document.createElement('div');
    el.className = 'card pending';
    el.id = 'pending-' + id;
    el.innerHTML =
      '<div class="card-head">' +
        '<span class="card-id">#' + esc(id) + '</span>' +
        '<span class="stamp stamp-pend">قيد الانتظار</span>' +
        '<span class="card-fee">—</span>' +
      '</div>' +
      '<div class="card-prompt">' + esc(promptText) + '</div>' +
      '<div class="card-time">بثوث الآن — broadcast now</div>';
    container.insertBefore(el, container.firstChild);
    pending[id] = el;
  }

  // ── load + render responses ─────────────────────────────────────────────────
  function loadResponses() {
    fetch(base + '/responses?limit=100')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = data.responses || [];
        if (!list.length) return;

        // remove pending cards that now have real responses
        list.forEach(function(resp) {
          var reqId = resp.request_id;
          if (pending[reqId]) {
            pending[reqId].remove();
            delete pending[reqId];
          }
        });

        renderResponses(list);
        loadStats();
      })
      .catch(function() {});
  }

  function renderResponses(list) {
    var container = document.getElementById('responses');
    var empty = document.getElementById('empty');
    if (list.length === 0) return;
    if (empty) empty.remove();

    // newest first
    list.sort(function(a, b) { return (b.created_at || 0) - (a.created_at || 0); });

    // avoid re-rendering everything if already showing newer cards
    var existingIds = {};
    container.querySelectorAll('.card').forEach(function(c) {
      var id = c.dataset.rid;
      if (id) existingIds[id] = c;
    });

    list.forEach(function(resp) {
      var reqId = resp.request_id || '';
      if (existingIds[reqId + '_' + (resp.agent_id || '')]) return;

      var card = document.createElement('div');
      card.className = 'card';
      card.dataset.rid = reqId + '_' + (resp.agent_id || '');
      var ts = resp.created_at ? new Date(resp.created_at * 1000).toLocaleString('ar-SA') : '';
      var status = resp.status || 'fulfilled';
      var stampClass = status === 'fulfilled' ? 'stamp-ok' : 'stamp-err';
      var stampText  = status === 'fulfilled' ? 'تم التسليم' : status;

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="card-id">#' + esc(reqId) + '</span>' +
          '<span class="stamp ' + stampClass + '">' + esc(stampText) + '</span>' +
          '<span class="card-agent">' + esc(resp.agent_id || '') + '</span>' +
          '<span class="card-fee">+' + ((resp.fee_usdc || 0).toFixed ? (resp.fee_usdc || 0).toFixed(4) : '?') + ' USDC</span>' +
        '</div>' +
        (resp.prompt ? '<div class="card-prompt">' + esc(resp.prompt) + '</div>' : '') +
        '<div class="card-text">' + esc(resp.response || '') + '</div>' +
        '<div class="card-time">' + ts + '</div>';
      container.insertBefore(card, container.firstChild);
    });
  }

  // ── SSE ─────────────────────────────────────────────────────────────────────
  var es = null;
  function connectSSE() {
    if (es) try { es.close(); } catch(e) {}
    try {
      es = new EventSource(base + '/stream');
      es.onopen = function() {
        document.getElementById('dot').classList.add('on');
        document.getElementById('status-txt').textContent = 'مباشر — live';
      };
      es.onerror = function() {
        document.getElementById('dot').classList.remove('on');
        document.getElementById('status-txt').textContent = 'إعادة الاتصال…';
        setTimeout(connectSSE, 3000);
      };
      ['ticker','orderbook','trade','trade_batch','message',
       'prompt_request','response'].forEach(function(ev) {
        es.addEventListener(ev, function() {
          loadResponses();
        });
      });
    } catch(e) {
      setTimeout(connectSSE, 5000);
    }
  }
  connectSSE();

  // ── init ────────────────────────────────────────────────────────────────────
  loadStats();
  loadResponses();
  setInterval(loadResponses, 6000);

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
