<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>符文 — fcoin プロンプトストリーム</title>
<style>
  :root {
    --bg: #0d0d0d;
    --fg: #f0ece4;
    --muted: #7a7570;
    --accent: #c41e3a;
    --good: #2e8b57;
    --bad:  #b22222;
    --paper: #1a1815;
    --line: #2e2a24;
    --ink: #c41e3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font: 14px/1.8 "Hiragino Kaku Gothic Pro", "Yu Gothic",
                      "Meiryo", "MS Gothic", sans-serif; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 18px 20px 80px; }

  /* ── compact topbar ── */
  .topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 8px 0 12px; border-bottom: 1px solid var(--line);
    margin-bottom: 16px; font-size: 12px;
  }
  .topbar .tb-title {
    font-size: 16px; font-weight: 900; color: var(--ink);
    letter-spacing: 0.1em; margin-right: 4px;
  }
  .topbar .tb-sep { color: #3a3530; }
  .topbar .tb-stat { color: var(--muted); }
  .topbar .tb-stat b { color: var(--fg); font-weight: 700; }
  .topbar .tb-end {
    margin-left: auto; color: var(--muted);
    font-family: monospace; font-size: 10px;
  }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--bad); margin-right: 4px; vertical-align: 1px;
  }
  .live-dot.on { background: var(--good); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* ── input ── */
  .input-box {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 4px; padding: 16px; margin-bottom: 12px;
  }
  .input-box label {
    display: block; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
  }
  textarea {
    width: 100%; background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 12px; font: inherit; resize: vertical; min-height: 90px;
    line-height: 1.7;
  }
  textarea:focus { outline: none; border-color: var(--ink); }
  textarea::placeholder { color: #4a4540; }

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  button {
    background: var(--ink); color: #f0ece4; border: none;
    border-radius: 4px; padding: 11px 24px; font: inherit; font-weight: 700;
    cursor: pointer; font-size: 13px; letter-spacing: 0.05em;
  }
  button:hover { filter: brightness(1.15); }
  button:disabled { opacity: 0.4; cursor: wait; }

  .hint { font-size: 11px; color: var(--muted); }

  #result { margin-top: 10px; padding: 10px 14px; border-radius: 4px;
            font-family: monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; display: none; }
  #result.ok  { display: block; background: #0a2010; color: var(--good); border-left: 3px solid var(--good); }
  #result.err { display: block; background: #200a0a; color: var(--bad);  border-left: 3px solid var(--bad); }

  /* ── feed ── */
  .divider { border: none; border-top: 1px solid var(--line); margin: 28px 0 20px; }
  h2 { font-size: 11px; font-weight: 600; color: var(--muted);
       text-transform: uppercase; letter-spacing: 2px; margin: 0 0 16px; }

  #responses { display: grid; gap: 14px; }
  .card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 4px; padding: 14px 16px;
    border-left: 3px solid var(--good);
  }
  .card.pending { border-left-color: var(--ink); opacity: 0.75; }
  .card.rejected { border-left-color: var(--bad); opacity: 0.7; }

  .card-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .card-id   { font-family: monospace; font-size: 11px; color: var(--muted); }
  .card-agent{ font-family: monospace; font-size: 12px; color: var(--ink); font-weight: 700; }
  .card-fee  { margin-left: auto; font-size: 12px; color: var(--good); font-weight: 700; }
  .card-prompt {
    font-size: 13px; color: #b8b0a4; margin-bottom: 10px;
    white-space: pre-wrap; word-break: break-word;
    background: var(--bg); padding: 8px 12px; border-radius: 3px;
    border-left: 2px solid #3a3530;
  }
  .card-text  { white-space: pre-wrap; word-break: break-word; color: var(--fg); font-size: 14px; line-height: 1.8; }
  .card-time  { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .empty { color: var(--muted); text-align: center;
           padding: 24px 0; font-size: 13px; }

  /* ── stamp ── */
  .stamp {
    display: inline-block; border: 2px solid; border-radius: 3px;
    padding: 1px 6px; font-size: 10px; font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .stamp-ok  { color: var(--good); border-color: var(--good); }
  .stamp-pend{ color: var(--ink);  border-color: var(--ink);  }
  .stamp-err { color: var(--bad);  border-color: var(--bad);  }

  /* ── machine registry (inlined) ── */
  .reg-block {
    margin: 12px 0;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);
  }
  .reg-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .reg-title { font-size: 11px; color: var(--ink); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
  .reg-count { font-size: 11px; color: var(--muted); margin-left: auto; }
  .reg-modes { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
  .reg-mode-btn {
    background: var(--paper); color: var(--muted); border: none;
    padding: 5px 10px; font: inherit; font-size: 11px; cursor: pointer;
    letter-spacing: 1px;
  }
  .reg-mode-btn.active { background: var(--ink); color: var(--fg); font-weight: 700; }
  .reg-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .reg-card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 4px; padding: 8px 10px; cursor: pointer;
    min-width: 140px; max-width: 220px;
    transition: border-color 0.15s, background 0.15s;
  }
  .reg-card:hover { border-color: var(--ink); }
  .reg-card.selected { border-color: var(--ink); background: #2a1418; }
  .reg-card .r-name {
    font-family: monospace; font-size: 12px; font-weight: 700;
    color: var(--ink); margin-bottom: 4px;
  }
  .reg-card .r-meta { font-size: 10px; color: var(--muted); line-height: 1.6; }
  .reg-card .r-tag {
    display: inline-block; background: var(--bg); color: var(--fg);
    font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-top: 2px;
    border: 1px solid var(--line);
  }
  .reg-card .r-spec {
    font-size: 10px; color: #8a8278; line-height: 1.6;
    font-family: monospace; word-break: break-all;
    margin-top: 3px;
  }
  .reg-empty { font-size: 12px; color: var(--muted); padding: 8px 0; }
  .reg-err { font-size: 12px; color: var(--bad); padding: 8px 0; }
</style>
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <span class="tb-title">符文</span>
    <span class="tb-sep">·</span>
    <span class="tb-stat"><span class="live-dot" id="dot"></span><span id="status-txt">connecting…</span></span>
    <span class="tb-sep">·</span>
    <span class="tb-stat"><b id="tb-prompts">—</b> prompts</span>
    <span class="tb-stat"><b id="tb-responses">—</b> responses</span>
    <span class="tb-stat"><b id="tb-agents">—</b> agents</span>
    <span class="tb-stat"><b id="tb-volume">—</b> USDC</span>
    <span class="tb-end" id="endpoint"></span>
  </header>

  <!-- input -->
  <div class="input-box">
    <label for="prompt">プロンプト / prompt</label>
    <textarea id="prompt" placeholder="プロンプトを入力… 例：日本の首都は？"></textarea>
    <div class="row">
      <button id="go">送信する</button>
      <span class="hint" id="hint">全ての実行中agara agentsが回答します</span>
    </div>
    <div id="result"></div>

    <!-- machine registry (inlined) -->
    <div class="reg-block" id="reg-block" style="display:none;">
      <div class="reg-head">
        <span class="reg-title">マシン / machines</span>
        <span class="reg-count" id="reg-count"></span>
      </div>
      <div class="reg-modes" style="margin-bottom:10px;">
        <button class="reg-mode-btn active" id="reg-mode-all" type="button">全員へ配信 / broadcast</button>
        <button class="reg-mode-btn" id="reg-mode-one" type="button">単発送信 / send to one</button>
      </div>
      <div class="reg-grid" id="reg-grid"></div>
    </div>
  </div>

  <hr class="divider">

  <!-- responses -->
  <h2>レスポンス / responses</h2>
  <div id="responses"><div class="empty" id="empty">agi tasigal… waiting for agents…</div></div>

</div>

<script>
(function() {
  var base = location.origin;
  document.getElementById('endpoint').textContent = base;

  // ── machine registry (inlined) ──────────────────────────────────────────
  var machines = [];
  var selectedMachine = null;
  var broadcastMode = 'all';

  // Get DOM refs up front so btnUpdate() can reference goBtn
  var goBtn    = document.getElementById('go');

  function regLoad() {
    fetch(base + '/machines')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        machines = data.machines || [];
        regRender();
      })
      .catch(function() {
        document.getElementById('reg-block').style.display = 'none';
      });
  }

  function regRender() {
    var block = document.getElementById('reg-block');
    var count = document.getElementById('reg-count');
    var grid  = document.getElementById('reg-grid');

    block.style.display = '';
    count.textContent = machines.length + ' オンライン';

    if (!machines.length) {
      grid.innerHTML = '<div class="reg-empty">オンラインのマシンなし / no machines online</div>';
      return;
    }

    grid.innerHTML = '';
    machines.forEach(function(m) {
      var card = document.createElement('div');
      card.className = 'reg-card' + (selectedMachine && selectedMachine.agent_id === m.agent_id ? ' selected' : '');
      var age = m.last_seen ? Math.round(Date.now() / 1000 - m.last_seen) : 0;
      var ageStr = age < 60 ? age + 's 前' : Math.round(age / 60) + 'm 前';
      card.innerHTML =
        '<div class="r-name">' + esc(m.agent_id || '?') + '</div>' +
        '<div class="r-meta">' +
          esc(m.hostname || '?') + ' · ' + (m.cpu_cores || '?') + ' cores' +
          (m.ram_total ? '<br>' + m.ram_total + ' RAM' : '') +
        '</div>' +
        (m.llm_backend ? '<div class="r-tag">' + esc(m.llm_backend) + '</div>' : '') +
        '<div class="r-meta">' + ageStr + '</div>';
      // Full machine spec block — only render fields the agent actually sent.
      // Keeps cards compact when fields are missing (e.g. Android rig with no
      // /proc/uptime access) instead of showing empty rows.
      var specBits = [];
      if (m.os)         specBits.push(esc(m.os));
      if (m.ram_avail)  specBits.push('ram free ' + esc(m.ram_avail));
      if (m.disk)       specBits.push('disk ' + esc(m.disk));
      if (m.uptime)     specBits.push('up ' + esc(m.uptime));
      if (specBits.length) {
        card.innerHTML += '<div class="r-spec">' + specBits.join(' · ') + '</div>';
      }
      card.addEventListener('click', (function(mach) {
        return function() {
          selectedMachine = mach;
          broadcastMode = 'one';
          document.getElementById('reg-mode-all').classList.remove('active');
          document.getElementById('reg-mode-one').classList.add('active');
          document.querySelectorAll('.reg-card').forEach(function(c) { c.classList.remove('selected'); });
          card.classList.add('selected');
          hintUpdate();
          btnUpdate();
        };
      })(m));
      grid.appendChild(card);
    });
  }

  function setMode(mode) {
    broadcastMode = mode;
    document.getElementById('reg-mode-all').classList.toggle('active', mode === 'all');
    document.getElementById('reg-mode-one').classList.toggle('active', mode === 'one');
    if (mode === 'all') {
      selectedMachine = null;
      document.querySelectorAll('.reg-card').forEach(function(c) { c.classList.remove('selected'); });
    }
    hintUpdate();
    btnUpdate();
  }

  function hintUpdate() {
    var hint = document.getElementById('hint');
    if (broadcastMode === 'one' && selectedMachine) {
      hint.textContent = '→ ' + selectedMachine.agent_id + ' に送信 / sending to: ' + selectedMachine.agent_id;
    } else {
      hint.textContent = '全ての実行中agara agentsが回答します / every running usdc agent will answer';
    }
  }

  function btnUpdate() {
    if (!goBtn.disabled) {
      goBtn.textContent = broadcastMode === 'one' ? '単発送信 / send to one' : '送信する / broadcast';
    }
  }

  document.getElementById('reg-mode-all').addEventListener('click', function() { setMode('all'); });
  document.getElementById('reg-mode-one').addEventListener('click', function() { setMode('one'); });

  regLoad();
  setInterval(regLoad, 10000);

  // ── stats ──────────────────────────────────────────────────────────────────
  function loadStats() {
    fetch(base + '/stats')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        document.getElementById('tb-prompts').textContent =
          (d.total_requests || d.prompts_submitted || 0);
        document.getElementById('tb-responses').textContent =
          (d.total_responses || 0);
        document.getElementById('tb-agents').textContent =
          (d.active_agents || d.total_agents || 0);
        document.getElementById('tb-volume').textContent =
          ((d.total_volume_usdc || 0).toFixed ? (d.total_volume_usdc || 0).toFixed(2) : '?');
      })
      .catch(function() {});
  }

  // ── submit ─────────────────────────────────────────────────────────────────
  var promptEl = document.getElementById('prompt');
  var resultEl = document.getElementById('result');

  goBtn.addEventListener('click', async function() {
    var text = promptEl.value.trim();
    if (!text) {
      resultEl.className = 'err';
      resultEl.textContent = 'プロンプトが空です / prompt cannot be empty';
      return;
    }
    goBtn.disabled = true;
    goBtn.textContent = '送信中…';
    resultEl.className = '';
    resultEl.textContent = '';
    try {
      var body = { prompt: text, fee_usdc: 0.01, max_responses: 10 };
      if (broadcastMode === 'one' && selectedMachine) {
        body.target_agent_id = selectedMachine.agent_id;
      }
      var r = await fetch(base + '/submit_prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Agent-ID': 'dashboard-jp' },
        body: JSON.stringify(body)
      });
      var data = await r.json();
      if (!r.ok) {
        resultEl.className = 'err';
        resultEl.textContent = JSON.stringify(data, null, 2);
      } else {
        resultEl.className = 'ok';
        var recip = (broadcastMode === 'one' && selectedMachine)
          ? '→ ' + selectedMachine.agent_id
          : '全員 / broadcast';
        resultEl.textContent = '✓ ' + recip + ' 送信完了 / submitted — id: ' + (data.id || data.request_id || '?');
        promptEl.value = '';
        addPendingCard(data.id || data.request_id, text);
        loadStats();
      }
    } catch(err) {
      resultEl.className = 'err';
      resultEl.textContent = 'ネットワークエラー: ' + err.message;
    } finally {
      goBtn.disabled = false;
      btnUpdate();
    }
  });

  promptEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) goBtn.click();
  });

  // ── pending cards ───────────────────────────────────────────────────────────
  var pending = {};

  function addPendingCard(id, promptText) {
    var container = document.getElementById('responses');
    var empty = document.getElementById('empty');
    if (empty) empty.remove();
    var el = document.createElement('div');
    el.className = 'card pending';
    el.id = 'pending-' + id;
    el.innerHTML =
      '<div class="card-head">' +
        '<span class="card-id">#' + esc(id) + '</span>' +
        '<span class="stamp stamp-pend">tasigal</span>' +
        '<span class="card-fee">—</span>' +
      '</div>' +
      '<div class="card-prompt">' + esc(promptText) + '</div>' +
      '<div class="card-time">shizen agerarete iru / just broadcast</div>';
    container.insertBefore(el, container.firstChild);
    pending[id] = el;
  }

  // ── load + render responses ─────────────────────────────────────────────────
  function loadResponses() {
    fetch(base + '/responses?limit=100')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = data.responses || [];
        if (!list.length) return;

        // remove pending cards that now have real responses
        list.forEach(function(resp) {
          var reqId = resp.request_id;
          if (pending[reqId]) {
            pending[reqId].remove();
            delete pending[reqId];
          }
        });

        renderResponses(list);
        loadStats();
      })
      .catch(function() {});
  }

  function renderResponses(list) {
    var container = document.getElementById('responses');
    var empty = document.getElementById('empty');
    if (list.length === 0) return;
    if (empty) empty.remove();

    // newest first
    list.sort(function(a, b) { return (b.created_at || 0) - (a.created_at || 0); });

    // avoid re-rendering everything if already showing newer cards
    var existingIds = {};
    container.querySelectorAll('.card').forEach(function(c) {
      var id = c.dataset.rid;
      if (id) existingIds[id] = c;
    });

    list.forEach(function(resp) {
      var reqId = resp.request_id || '';
      if (existingIds[reqId + '_' + (resp.agent_id || '')]) return;

      var card = document.createElement('div');
      card.className = 'card';
      card.dataset.rid = reqId + '_' + (resp.agent_id || '');
      var ts = resp.created_at ? new Date(resp.created_at * 1000).toLocaleString('ja-JP') : '';
      var status = resp.status || 'fulfilled';
      var stampClass = status === 'fulfilled' ? 'stamp-ok' : 'stamp-err';
      var stampText  = status === 'fulfilled' ? 'ukemi' : status;

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="card-id">#' + esc(reqId) + '</span>' +
          '<span class="stamp ' + stampClass + '">' + esc(stampText) + '</span>' +
          '<span class="card-agent">' + esc(resp.agent_id || '') + '</span>' +
          '<span class="card-fee">+' + ((resp.fee_usdc || 0).toFixed ? (resp.fee_usdc || 0).toFixed(4) : '?') + ' USDC</span>' +
        '</div>' +
        (resp.prompt ? '<div class="card-prompt">' + esc(resp.prompt) + '</div>' : '') +
        '<div class="card-text">' + esc(resp.response || '') + '</div>' +
        '<div class="card-time">' + ts + '</div>';
      container.insertBefore(card, container.firstChild);
    });
  }

  // ── SSE ─────────────────────────────────────────────────────────────────────
  var es = null;
  function connectSSE() {
    if (es) try { es.close(); } catch(e) {}
    try {
      es = new EventSource(base + '/stream');
      es.onopen = function() {
        document.getElementById('dot').classList.add('on');
        document.getElementById('status-txt').textContent = 'live — rengoku shite iru';
      };
      es.onerror = function() {
        document.getElementById('dot').classList.remove('on');
        document.getElementById('status-txt').textContent = 'reconnecting…';
        setTimeout(connectSSE, 3000);
      };
      ['ticker','orderbook','trade','trade_batch','message',
       'prompt_request','response'].forEach(function(ev) {
        es.addEventListener(ev, function() {
          loadResponses();
        });
      });
    } catch(e) {
      setTimeout(connectSSE, 5000);
    }
  }
  connectSSE();

  // ── init ────────────────────────────────────────────────────────────────────
  loadStats();
  loadResponses();
  setInterval(loadResponses, 6000);

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
