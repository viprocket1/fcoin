<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rune — prompt marketplace</title>
<style>
  :root {
    --bg: #0e0f12;
    --fg: #e7e9ee;
    --muted: #8a8f9a;
    --accent: #f5a524;
    --good: #4ade80;
    --bad:  #ef4444;
    --panel: #16181d;
    --line: #262932;
    --tag-bg: #1e2030;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text",
                     "Segoe UI", Roboto, sans-serif; }

  .wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

  header { display: flex; align-items: baseline; gap: 14px;
            margin-bottom: 28px; flex-wrap: wrap; }
  header h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--accent); }
  header .sub { font-size: 13px; color: var(--muted); }
  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--bad); margin-right: 5px; vertical-align: 2px;
  }
  .live-dot.on { background: var(--good); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .endpoint { margin-left: auto; font-size: 11px; color: var(--muted);
              font-family: ui-monospace, monospace; }

  /* ---- machine selector ---- */
  .machines-section { margin-bottom: 24px; }

  .machines-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .machines-bar .label { font-size: 12px; color: var(--muted); font-weight: 600;
                          text-transform: uppercase; letter-spacing: 1.2px; }
  .machines-bar .count { font-size: 12px; color: var(--muted); }

  #machine-list {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  .machine-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    min-width: 130px; max-width: 200px;
  }
  .machine-card:hover { border-color: var(--accent); }
  .machine-card.selected { border-color: var(--accent); background: #1e1810; }
  .machine-card .m-name {
    font-family: ui-monospace, monospace; font-size: 12px;
    font-weight: 600; color: var(--accent); margin-bottom: 4px;
  }
  .machine-card .m-meta { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .machine-card .m-backend {
    display: inline-block; background: var(--tag-bg); color: var(--fg);
    font-size: 10px; padding: 1px 5px; border-radius: 4px; margin-top: 3px;
  }
  .machine-card .m-offline { color: var(--bad); font-size: 11px; }

  .machines-loading, .machines-empty { font-size: 13px; color: var(--muted); }

  /* ---- broadcast mode toggle ---- */
  .mode-toggle {
    display: inline-flex; gap: 0; border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden; margin-bottom: 10px;
  }
  .mode-toggle button {
    background: var(--panel); color: var(--muted);
    border: none; padding: 7px 16px; font: inherit; font-size: 13px;
    cursor: pointer;
  }
  .mode-toggle button.active { background: var(--accent); color: #0a0b0e; font-weight: 700; }

  textarea {
    width: 100%; background: #0a0b0e; color: var(--fg);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; font: inherit; resize: vertical; min-height: 100px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .row { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }

  button {
    background: var(--accent); color: #0a0b0e; border: 0;
    border-radius: 8px; padding: 11px 22px; font: inherit; font-weight: 700;
    cursor: pointer; font-size: 15px;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.45; cursor: wait; }

  #result { margin-top: 10px; padding: 10px 14px; border-radius: 6px;
            font-family: ui-monospace, monospace; font-size: 13px;
            white-space: pre-wrap; word-break: break-all; display: none; }
  #result.ok  { display: block; background: #0a2818; color: var(--good); border: 1px solid #1a4a2c; }
  #result.err { display: block; background: #2a0a0e; color: var(--bad);  border: 1px solid #5a1a22; }

  .divider { border: none; border-top: 1px solid var(--line); margin: 28px 0 20px; }

  h2 { font-size: 12px; font-weight: 600; color: var(--muted);
       text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 14px; }

  /* ---- response cards ---- */
  #responses { display: grid; gap: 12px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px;
    border-left: 3px solid var(--good);
  }
  .card-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .card-id   { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
  .card-agent{ font-family: ui-monospace, monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
  .card-fee  { margin-left: auto; font-size: 12px; color: var(--good); font-weight: 600; }
  .card-prompt { font-size: 13px; color: var(--muted); margin-bottom: 10px;
                 white-space: pre-wrap; word-break: break-word;
                 background: #0a0b0e; padding: 8px 10px; border-radius: 6px;
                 border-left: 2px solid var(--muted); }
  .card-text  { white-space: pre-wrap; word-break: break-word; color: var(--fg); font-size: 14px; }
  .card-time  { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .empty { color: var(--muted); font-style: italic; text-align: center;
           padding: 20px 0; font-size: 14px; }

  .pending {
    border-left-color: var(--accent);
    opacity: 0.7;
  }
  .pending .card-fee { color: var(--accent); }

  /* selected target badge */
  .target-badge {
    display: inline-block; background: var(--tag-bg); color: var(--accent);
    font-size: 11px; padding: 2px 8px; border-radius: 6px;
    border: 1px solid var(--accent); margin-left: 8px;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>rune</h1>
    <span class="sub">prompt marketplace — pick your machine</span>
    <span class="live-dot" id="dot"></span>
    <span class="endpoint" id="endpoint"></span>
  </header>

  <!-- machine selector -->
  <div class="machines-section">
    <div class="machines-bar">
      <span class="label">machines</span>
      <span class="count" id="machine-count"></span>
    </div>
    <div class="mode-toggle">
      <button id="mode-all" class="active" onclick="setMode('all')">broadcast to all</button>
      <button id="mode-one" onclick="setMode('one')">send to one</button>
    </div>
    <div id="machine-list">
      <span class="machines-loading">loading machines…</span>
    </div>
  </div>

  <!-- input -->
  <div>
    <textarea id="prompt" placeholder="Ask anything… e.g. What is the capital of Japan?"></textarea>
    <div class="row">
      <button id="go">broadcast prompt</button>
      <span id="hint" style="font-size:12px;color:var(--muted)">every running usdc agent will answer</span>
    </div>
    <div id="result"></div>
  </div>

  <hr class="divider">

  <!-- responses -->
  <h2>responses</h2>
  <div id="responses"><div class="empty" id="empty">waiting for agents to respond…</div></div>

</div>

<script>
(function() {
  var base = location.origin;
  document.getElementById('endpoint').textContent = base;

  // ----- machine registry -----
  var machines = [];     // [{agent_id, hostname, os, cpu_cores, ram_total, llm_backend, last_seen}]
  var selectedMachine = null;
  var broadcastMode = 'all';  // 'all' or 'one'

  function setMode(mode) {
    broadcastMode = mode;
    document.getElementById('mode-all').classList.toggle('active', mode === 'all');
    document.getElementById('mode-one').classList.toggle('active', mode === 'one');
    if (mode === 'all') {
      selectedMachine = null;
      document.querySelectorAll('.machine-card').forEach(function(c) { c.classList.remove('selected'); });
      updateHint();
    }
  }

  function updateHint() {
    var hint = document.getElementById('hint');
    if (broadcastMode === 'one' && selectedMachine) {
      hint.textContent = 'sending to: ' + selectedMachine.agent_id;
    } else {
      hint.textContent = 'every running usdc agent will answer';
    }
  }

  function loadMachines() {
    fetch(base + '/machines')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        machines = data.machines || [];
        renderMachines();
      })
      .catch(function() {
        document.getElementById('machine-list').innerHTML =
          '<span class="machines-empty">could not load machines</span>';
      });
  }

  function renderMachines() {
    var container = document.getElementById('machine-list');
    var count = document.getElementById('machine-count');
    count.textContent = machines.length + ' online';

    if (!machines.length) {
      container.innerHTML = '<span class="machines-empty">no machines online — all agents offline</span>';
      return;
    }

    container.innerHTML = '';
    machines.forEach(function(m) {
      var card = document.createElement('div');
      card.className = 'machine-card' + (selectedMachine && selectedMachine.agent_id === m.agent_id ? ' selected' : '');
      card.title = 'Click to select this machine';
      var age = m.last_seen ? Math.round((Date.now() / 1000 - m.last_seen)) : 0;
      var ageStr = age < 60 ? age + 's ago' : Math.round(age / 60) + 'm ago';
      card.innerHTML =
        '<div class="m-name">' + esc(m.agent_id || '?') + '</div>' +
        '<div class="m-meta">' +
          esc(m.hostname || '?') + ' · ' + (m.cpu_cores || '?') + ' cores' +
          (m.ram_total ? '<br>' + m.ram_total + ' RAM' : '') +
        '</div>' +
        (m.llm_backend ? '<div class="m-backend">' + esc(m.llm_backend) + '</div>' : '') +
        '<div class="m-meta">seen ' + ageStr + '</div>';
      card.addEventListener('click', (function(mach) {
        return function() {
          selectedMachine = mach;
          broadcastMode = 'one';
          document.getElementById('mode-all').classList.remove('active');
          document.getElementById('mode-one').classList.add('active');
          document.querySelectorAll('.machine-card').forEach(function(c) { c.classList.remove('selected'); });
          card.classList.add('selected');
          updateHint();
        };
      })(m));
      container.appendChild(card);
    });
  }

  // poll machines every 10s
  loadMachines();
  setInterval(loadMachines, 10000);

  // ----- submit -----
  var goBtn   = document.getElementById('go');
  var promptEl = document.getElementById('prompt');
  var resultEl = document.getElementById('result');

  goBtn.addEventListener('click', async function() {
    var text = promptEl.value.trim();
    if (!text) {
      resultEl.className = 'err';
      resultEl.textContent = 'prompt cannot be empty';
      return;
    }
    goBtn.disabled = true;
    goBtn.textContent = broadcastMode === 'one' ? 'sending…' : 'broadcasting…';
    resultEl.className = '';
    resultEl.textContent = '';
    try {
      var body = { prompt: text, fee_usdc: 0.01, max_responses: 10 };
      if (broadcastMode === 'one' && selectedMachine) {
        body.target_agent_id = selectedMachine.agent_id;
      }
      var r = await fetch(base + '/submit_prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Agent-ID': 'dashboard' },
        body: JSON.stringify(body)
      });
      var data = await r.json();
      if (!r.ok) {
        resultEl.className = 'err';
        resultEl.textContent = JSON.stringify(data, null, 2);
      } else {
        resultEl.className = 'ok';
        var target = data.target_agent_id || data.id;
        var msg = broadcastMode === 'one' && selectedMachine
          ? 'sent to ' + selectedMachine.agent_id + ' — prompt id: ' + target
          : 'broadcast sent — prompt id: ' + target;
        resultEl.textContent = '✓ ' + msg;
        promptEl.value = '';
        addPendingPrompt(target, text, selectedMachine);
      }
    } catch(err) {
      resultEl.className = 'err';
      resultEl.textContent = 'network error: ' + err.message;
    } finally {
      goBtn.disabled = false;
      goBtn.textContent = broadcastMode === 'one' ? 'send to machine' : 'broadcast prompt';
    }
  });

  // update button label on mode change
  function updateBtnLabel() {
    if (!goBtn.disabled) {
      goBtn.textContent = broadcastMode === 'one' ? 'send to machine' : 'broadcast prompt';
    }
  }
  document.getElementById('mode-all').addEventListener('click', function() {
    setMode('all'); updateBtnLabel();
  });
  document.getElementById('mode-one').addEventListener('click', function() {
    setMode('one'); updateBtnLabel();
  });

  promptEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) goBtn.click();
  });

  // ----- pending prompts we submitted (shown as pending cards) -----
  var pending = {};  // request_id -> {prompt, el}

  function addPendingPrompt(id, promptText, machine) {
    var container = document.getElementById('responses');
    var empty = document.getElementById('empty');
    if (empty) empty.remove();
    var el = document.createElement('div');
    el.className = 'card pending';
    el.id = 'pending-' + id;
    var targetLabel = machine
      ? '<span class="target-badge">→ ' + esc(machine.agent_id) + '</span>'
      : '';
    el.innerHTML =
      '<div class="card-head">' +
        '<span class="card-id">#' + id + '</span>' +
        '<span class="card-agent">pending…</span>' + targetLabel +
        '<span class="card-fee">—</span>' +
      '</div>' +
      '<div class="card-prompt">' + esc(promptText) + '</div>' +
      '<div class="card-time">just broadcast</div>';
    container.insertBefore(el, container.firstChild);
    pending[id] = { prompt: promptText, el: el };
  }

  // ----- load + render responses -----
  function loadResponses() {
    fetch(base + '/responses?limit=100')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = data.responses || [];
        if (!list.length) return;

        // remove pending cards that now have real responses
        list.forEach(function(resp) {
          var reqId = resp.request_id;
          if (pending[reqId]) {
            pending[reqId].el.remove();
            delete pending[reqId];
          }
        });

        renderResponses(list);
      })
      .catch(function() {});
  }

  function renderResponses(list) {
    var container = document.getElementById('responses');
    var empty = document.getElementById('empty');
    if (list.length === 0) return;
    if (empty) empty.remove();

    // newest first
    list.sort(function(a, b) { return (b.created_at || 0) - (a.created_at || 0); });

    container.innerHTML = '';
    list.forEach(function(resp) {
      var card = document.createElement('div');
      card.className = 'card';
      var ts = resp.created_at ? new Date(resp.created_at * 1000).toLocaleTimeString() : '';
      card.innerHTML =
        '<div class="card-head">' +
          '<span class="card-id">#' + esc(resp.request_id || '') + '</span>' +
          '<span class="card-agent">' + esc(resp.agent_id || '') + '</span>' +
          '<span class="card-fee">+' + ((resp.fee_usdc || 0).toFixed ? (resp.fee_usdc || 0).toFixed(4) : '?') + ' USDC</span>' +
        '</div>' +
        (resp.prompt ? '<div class="card-prompt">' + esc(resp.prompt) + '</div>' : '') +
        '<div class="card-text">' + esc(resp.response || '') + '</div>' +
        '<div class="card-time">' + ts + '</div>';
      container.appendChild(card);
    });
  }

  // ----- SSE live updates -----
  var es = null;
  function connectSSE() {
    if (es) try { es.close(); } catch(e) {}
    try {
      es = new EventSource(base + '/stream');
      es.onopen = function() {
        document.getElementById('dot').classList.add('on');
      };
      es.onerror = function() {
        document.getElementById('dot').classList.remove('on');
        setTimeout(connectSSE, 3000);
      };
      ['ticker','orderbook','trade','trade_batch','message',
       'prompt_request','response'].forEach(function(ev) {
        es.addEventListener(ev, function() {
          loadResponses();
        });
      });
    } catch(e) {
      setTimeout(connectSSE, 5000);
    }
  }
  connectSSE();

  // initial load + 5s poll
  loadResponses();
  setInterval(loadResponses, 5000);

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
