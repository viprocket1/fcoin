# DigitalOcean App Platform spec — one-click deploy from GitHub
# Docs: https://docs.digitalocean.com/products/app-platform/reference/spec/

name: fcoin-agent
region: nyc

http_port: 8080
health_check:
  path: /health
  interval: 30
  timeout: 5

build_command: pip install --no-cache-dir -e .

run_command: python -m src --transport sse --port 8080

envs:
  - key: PORT
    value: "8080"
    type: SKY
