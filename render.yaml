# render.yaml — Render Blueprint
# One-click deploy: Redis + fcoin web service, wired together automatically.
#
# Render reads this file and provisions:
#   1. A free Redis instance (fcoin-redis)
#   2. A Python web service (fcoin) with REDIS_URL injected
#
# After clicking Deploy, your app is live with persistent wallet state.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - name: fcoin
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromRedis:
          name: fcoin-redis
          uriKey: REDIS_URI
      - key: PYTHON_VERSION
        value: "3.11"

redis:
  - name: fcoin-redis
    plan: free
